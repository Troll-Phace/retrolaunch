<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="260" height="800" fill="#0d0d15"/>
  <rect x="259" y="0" width="1" height="800" fill="#1e1e30"/>

  <!-- Sidebar title -->
  <text x="30" y="45" fill="#fff" font-size="18" font-weight="700">Settings</text>

  <!-- Sidebar nav items -->
  <rect x="10" y="65" width="240" height="40" rx="8" fill="#6366f1" opacity="0.1"/>
  <rect x="10" y="65" width="3" height="40" rx="1.5" fill="#6366f1"/>
  <text x="30" y="90" fill="#6366f1" font-size="13" font-weight="600">Emulator Config</text>

  <text x="30" y="130" fill="#888" font-size="13">ROM Directories</text>
  <text x="30" y="168" fill="#888" font-size="13">Metadata &amp; APIs</text>
  <text x="30" y="206" fill="#888" font-size="13">Appearance</text>
  <text x="30" y="244" fill="#888" font-size="13">Controls</text>
  <text x="30" y="282" fill="#888" font-size="13">About</text>

  <!-- Main content: Emulator Configuration -->
  <text x="300" y="45" fill="#fff" font-size="22" font-weight="700">Emulator Configuration</text>
  <text x="300" y="68" fill="#666" font-size="12">Map each system to its emulator executable and configure launch options</text>

  <!-- System cards -->
  <!-- SNES -->
  <rect x="300" y="90" width="860" height="100" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="320" y="108" width="50" height="50" rx="8" fill="#1a1a2e"/>
  <text x="345" y="138" fill="#3a3a4e" font-size="8" text-anchor="middle">SNES</text>
  <text x="390" y="128" fill="#fff" font-size="15" font-weight="600">Super Nintendo</text>
  <text x="390" y="148" fill="#4ade80" font-size="11">● Configured</text>
  <text x="390" y="166" fill="#555" font-size="11">.sfc, .smc, .fig, .swc</text>

  <!-- Path field -->
  <rect x="650" y="110" width="380" height="34" rx="8" fill="#0d0d15" stroke="#2a2a3a" stroke-width="1"/>
  <text x="665" y="132" fill="#888" font-size="11">/Applications/bsnes.app</text>
  <rect x="1000" y="114" width="22" height="26" rx="4" fill="#1e1e30"/>
  <text x="1011" y="132" fill="#6366f1" font-size="12" text-anchor="middle">…</text>

  <!-- Launch args -->
  <rect x="650" y="150" width="380" height="28" rx="6" fill="#0d0d15" stroke="#1e1e30" stroke-width="1"/>
  <text x="665" y="169" fill="#555" font-size="10">Launch args:  --fullscreen "{rom}"</text>

  <!-- NES -->
  <rect x="300" y="202" width="860" height="100" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="320" y="220" width="50" height="50" rx="8" fill="#1a1a2e"/>
  <text x="345" y="250" fill="#3a3a4e" font-size="8" text-anchor="middle">NES</text>
  <text x="390" y="240" fill="#fff" font-size="15" font-weight="600">Nintendo Entertainment System</text>
  <text x="390" y="260" fill="#4ade80" font-size="11">● Configured</text>
  <text x="390" y="278" fill="#555" font-size="11">.nes, .unf, .unif</text>

  <rect x="650" y="222" width="380" height="34" rx="8" fill="#0d0d15" stroke="#2a2a3a" stroke-width="1"/>
  <text x="665" y="244" fill="#888" font-size="11">/Applications/Mesen.app</text>
  <rect x="1000" y="226" width="22" height="26" rx="4" fill="#1e1e30"/>
  <text x="1011" y="244" fill="#6366f1" font-size="12" text-anchor="middle">…</text>

  <rect x="650" y="262" width="380" height="28" rx="6" fill="#0d0d15" stroke="#1e1e30" stroke-width="1"/>
  <text x="665" y="281" fill="#555" font-size="10">Launch args:  "{rom}"</text>

  <!-- PlayStation -->
  <rect x="300" y="314" width="860" height="100" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="320" y="332" width="50" height="50" rx="8" fill="#1a1a2e"/>
  <text x="345" y="362" fill="#3a3a4e" font-size="8" text-anchor="middle">PS1</text>
  <text x="390" y="352" fill="#fff" font-size="15" font-weight="600">PlayStation</text>
  <text x="390" y="372" fill="#4ade80" font-size="11">● Configured</text>
  <text x="390" y="390" fill="#555" font-size="11">.bin, .cue, .chd, .iso, .pbp</text>

  <rect x="650" y="334" width="380" height="34" rx="8" fill="#0d0d15" stroke="#2a2a3a" stroke-width="1"/>
  <text x="665" y="356" fill="#888" font-size="11">/Applications/DuckStation.app</text>
  <rect x="1000" y="338" width="22" height="26" rx="4" fill="#1e1e30"/>
  <text x="1011" y="356" fill="#6366f1" font-size="12" text-anchor="middle">…</text>

  <rect x="650" y="374" width="380" height="28" rx="6" fill="#0d0d15" stroke="#1e1e30" stroke-width="1"/>
  <text x="665" y="393" fill="#555" font-size="10">Launch args:  -- "{rom}"</text>

  <!-- GBA — unconfigured -->
  <rect x="300" y="426" width="860" height="100" rx="12" fill="#141420" stroke="#f59e0b33" stroke-width="1" stroke-dasharray="4"/>
  <rect x="320" y="444" width="50" height="50" rx="8" fill="#1a1a2e"/>
  <text x="345" y="474" fill="#3a3a4e" font-size="8" text-anchor="middle">GBA</text>
  <text x="390" y="464" fill="#fff" font-size="15" font-weight="600">Game Boy Advance</text>
  <text x="390" y="484" fill="#f59e0b" font-size="11">○ Not configured</text>
  <text x="390" y="502" fill="#555" font-size="11">.gba, .agb</text>

  <rect x="650" y="446" width="380" height="34" rx="8" fill="#0d0d15" stroke="#f59e0b55" stroke-width="1" stroke-dasharray="3"/>
  <text x="665" y="468" fill="#555" font-size="11">Click to select emulator...</text>
  <rect x="1000" y="450" width="22" height="26" rx="4" fill="#1e1e30"/>
  <text x="1011" y="468" fill="#f59e0b" font-size="12" text-anchor="middle">…</text>

  <!-- Add system button -->
  <rect x="300" y="545" width="860" height="52" rx="12" fill="transparent" stroke="#2a2a3a" stroke-width="1" stroke-dasharray="6"/>
  <text x="730" y="576" fill="#6366f1" font-size="14" text-anchor="middle">+ Add System</text>

  <!-- Annotation: Emulator detection hint -->
  <g transform="translate(300, 620)">
    <rect x="0" y="0" width="860" height="55" rx="10" fill="#6366f115" stroke="#6366f133" stroke-width="1"/>
    <text x="20" y="22" fill="#6366f1" font-size="12" font-weight="600">💡 Auto-detection</text>
    <text x="20" y="42" fill="#888" font-size="11">RetroLaunch can scan common install locations for known emulators. Click "Auto-detect" to populate paths automatically.</text>
    <rect x="740" y="12" width="100" height="30" rx="15" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.5"/>
    <text x="790" y="32" fill="#6366f1" font-size="11" font-weight="600" text-anchor="middle">Auto-detect</text>
  </g>

  <!-- Wireframe label -->
  <text x="1170" y="790" fill="#333" font-size="9" text-anchor="end">RETROLAUNCH — Settings / Emulator Config Wireframe</text>
</svg>