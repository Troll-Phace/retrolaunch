<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Step indicator -->
  <g transform="translate(525, 50)">
    <circle cx="0" cy="0" r="5" fill="#6366f1" opacity="0.4"/>
    <circle cx="25" cy="0" r="5" fill="#6366f1" opacity="0.4"/>
    <circle cx="50" cy="0" r="5" fill="#6366f1"/>
    <circle cx="75" cy="0" r="5" fill="#2a2a3a"/>
    <circle cx="100" cy="0" r="5" fill="#2a2a3a"/>
    <circle cx="125" cy="0" r="5" fill="#2a2a3a"/>
    <text x="62" y="25" fill="#555" font-size="10" text-anchor="middle">Step 3 of 6</text>
  </g>

  <text x="40" y="52" fill="#6366f1" font-size="14">← Back</text>

  <!-- Title -->
  <text x="600" y="120" fill="#ffffff" font-size="32" font-weight="700" text-anchor="middle" letter-spacing="-1">Set Up Your Emulators</text>
  <text x="600" y="150" fill="#8888aa" font-size="14" text-anchor="middle">Point each detected system to its emulator. Only systems with ROMs are shown.</text>

  <!-- Auto-detect banner -->
  <rect x="200" y="175" width="800" height="50" rx="10" fill="#6366f110" stroke="#6366f133" stroke-width="1"/>
  <text x="230" y="205" fill="#6366f1" font-size="12" font-weight="600">💡 Auto-detect found 5 emulators in common locations.</text>
  <rect x="860" y="186" width="120" height="30" rx="15" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.5"/>
  <text x="920" y="206" fill="#6366f1" font-size="11" font-weight="600" text-anchor="middle">Apply All</text>

  <!-- System rows — scrollable list -->
  <!-- SNES — configured (auto-detected) -->
  <rect x="200" y="245" width="800" height="72" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="218" y="257" width="48" height="48" rx="10" fill="#1a1a2e"/>
  <text x="242" y="286" fill="#3a3a4e" font-size="8" text-anchor="middle">SNES</text>
  <text x="280" y="274" fill="#fff" font-size="14" font-weight="600">Super Nintendo</text>
  <text x="350" y="274" fill="#555" font-size="14">· 47 games</text>
  <text x="280" y="296" fill="#4ade80" font-size="11">✓ Auto-detected</text>
  <!-- Path field -->
  <rect x="560" y="257" width="310" height="32" rx="8" fill="#0d0d15" stroke="#2a2a3a" stroke-width="1"/>
  <text x="575" y="278" fill="#888" font-size="11">/Applications/bsnes.app</text>
  <rect x="840" y="261" width="22" height="24" rx="4" fill="#1e1e30"/>
  <text x="851" y="278" fill="#6366f1" font-size="11" text-anchor="middle">…</text>
  <!-- Checkmark icon -->
  <circle cx="970" cy="281" r="14" fill="#4ade8020" stroke="#4ade80" stroke-width="1"/>
  <text x="970" y="286" fill="#4ade80" font-size="12" text-anchor="middle">✓</text>

  <!-- NES — configured -->
  <rect x="200" y="327" width="800" height="72" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="218" y="339" width="48" height="48" rx="10" fill="#1a1a2e"/>
  <text x="242" y="368" fill="#3a3a4e" font-size="8" text-anchor="middle">NES</text>
  <text x="280" y="356" fill="#fff" font-size="14" font-weight="600">NES</text>
  <text x="310" y="356" fill="#555" font-size="14">· 83 games</text>
  <text x="280" y="378" fill="#4ade80" font-size="11">✓ Auto-detected</text>
  <rect x="560" y="339" width="310" height="32" rx="8" fill="#0d0d15" stroke="#2a2a3a" stroke-width="1"/>
  <text x="575" y="360" fill="#888" font-size="11">/Applications/Mesen.app</text>
  <rect x="840" y="343" width="22" height="24" rx="4" fill="#1e1e30"/>
  <text x="851" y="360" fill="#6366f1" font-size="11" text-anchor="middle">…</text>
  <circle cx="970" cy="363" r="14" fill="#4ade8020" stroke="#4ade80" stroke-width="1"/>
  <text x="970" y="368" fill="#4ade80" font-size="12" text-anchor="middle">✓</text>

  <!-- PS1 — configured -->
  <rect x="200" y="409" width="800" height="72" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="218" y="421" width="48" height="48" rx="10" fill="#1a1a2e"/>
  <text x="242" y="450" fill="#3a3a4e" font-size="8" text-anchor="middle">PS1</text>
  <text x="280" y="438" fill="#fff" font-size="14" font-weight="600">PlayStation</text>
  <text x="370" y="438" fill="#555" font-size="14">· 31 games</text>
  <text x="280" y="460" fill="#4ade80" font-size="11">✓ Auto-detected</text>
  <rect x="560" y="421" width="310" height="32" rx="8" fill="#0d0d15" stroke="#2a2a3a" stroke-width="1"/>
  <text x="575" y="442" fill="#888" font-size="11">/Applications/DuckStation.app</text>
  <rect x="840" y="425" width="22" height="24" rx="4" fill="#1e1e30"/>
  <text x="851" y="442" fill="#6366f1" font-size="11" text-anchor="middle">…</text>
  <circle cx="970" cy="445" r="14" fill="#4ade8020" stroke="#4ade80" stroke-width="1"/>
  <text x="970" y="450" fill="#4ade80" font-size="12" text-anchor="middle">✓</text>

  <!-- GBA — NOT configured -->
  <rect x="200" y="491" width="800" height="72" rx="10" fill="#141420" stroke="#f59e0b33" stroke-width="1"/>
  <rect x="218" y="503" width="48" height="48" rx="10" fill="#1a1a2e"/>
  <text x="242" y="532" fill="#3a3a4e" font-size="8" text-anchor="middle">GBA</text>
  <text x="280" y="520" fill="#fff" font-size="14" font-weight="600">Game Boy Advance</text>
  <text x="435" y="520" fill="#555" font-size="14">· 56 games</text>
  <text x="280" y="542" fill="#f59e0b" font-size="11">○ Select an emulator</text>
  <rect x="560" y="503" width="310" height="32" rx="8" fill="#0d0d15" stroke="#f59e0b55" stroke-width="1" stroke-dasharray="3"/>
  <text x="575" y="524" fill="#555" font-size="11">Click to browse...</text>
  <rect x="840" y="507" width="22" height="24" rx="4" fill="#1e1e30"/>
  <text x="851" y="524" fill="#f59e0b" font-size="11" text-anchor="middle">…</text>
  <circle cx="970" cy="527" r="14" fill="#f59e0b15" stroke="#f59e0b55" stroke-width="1"/>
  <text x="970" y="531" fill="#f59e0b" font-size="10" text-anchor="middle">!</text>

  <!-- Genesis — NOT configured -->
  <rect x="200" y="573" width="800" height="72" rx="10" fill="#141420" stroke="#f59e0b33" stroke-width="1"/>
  <rect x="218" y="585" width="48" height="48" rx="10" fill="#1a1a2e"/>
  <text x="242" y="614" fill="#3a3a4e" font-size="8" text-anchor="middle">GEN</text>
  <text x="280" y="602" fill="#fff" font-size="14" font-weight="600">Sega Genesis</text>
  <text x="400" y="602" fill="#555" font-size="14">· 29 games</text>
  <text x="280" y="624" fill="#f59e0b" font-size="11">○ Select an emulator</text>
  <rect x="560" y="585" width="310" height="32" rx="8" fill="#0d0d15" stroke="#f59e0b55" stroke-width="1" stroke-dasharray="3"/>
  <text x="575" y="606" fill="#555" font-size="11">Click to browse...</text>
  <rect x="840" y="589" width="22" height="24" rx="4" fill="#1e1e30"/>
  <text x="851" y="606" fill="#f59e0b" font-size="11" text-anchor="middle">…</text>
  <circle cx="970" cy="609" r="14" fill="#f59e0b15" stroke="#f59e0b55" stroke-width="1"/>
  <text x="970" y="613" fill="#f59e0b" font-size="10" text-anchor="middle">!</text>

  <!-- Scroll hint: more below -->
  <text x="600" y="670" fill="#444" font-size="11" text-anchor="middle">↓ 4 more systems below</text>

  <!-- Status summary -->
  <text x="200" y="720" fill="#888" font-size="12">3 of 9 systems configured</text>
  <text x="200" y="738" fill="#555" font-size="11">Unconfigured systems will appear in your library but can't launch games until set up.</text>

  <!-- Continue button -->
  <rect x="475" y="730" width="250" height="50" rx="25" fill="url(#accent)" filter="url(#glow)"/>
  <text x="600" y="761" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Continue →</text>

  <text x="1170" y="790" fill="#333" font-size="9" text-anchor="end">RETROLAUNCH — Onboarding 3/6: Emulator Config</text>
</svg>