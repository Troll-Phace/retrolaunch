<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="heroClip"><rect x="30" y="80" width="1140" height="220" rx="16"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Title bar area -->
  <text x="30" y="45" fill="#ffffff" font-size="22" font-weight="700" letter-spacing="-0.5">RETROLAUNCH</text>
  <text x="30" y="62" fill="#6366f1" font-size="10" font-weight="600" letter-spacing="3">GAME LIBRARY</text>

  <!-- Search bar -->
  <rect x="820" y="22" width="260" height="38" rx="19" fill="#1a1a2a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="848" y="46" fill="#555" font-size="13">Search games...</text>
  <circle cx="838" cy="41" r="7" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="843" y1="46" x2="847" y2="50" stroke="#555" stroke-width="1.5"/>

  <!-- Settings icon -->
  <g transform="translate(1100, 30)">
    <circle cx="12" cy="12" r="14" fill="#1a1a2a" stroke="#2a2a3a" stroke-width="1"/>
    <circle cx="12" cy="12" r="4" fill="none" stroke="#666" stroke-width="1.5"/>
    <line x1="12" y1="2" x2="12" y2="6" stroke="#666" stroke-width="1.5"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="#666" stroke-width="1.5"/>
    <line x1="2" y1="12" x2="6" y2="12" stroke="#666" stroke-width="1.5"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="#666" stroke-width="1.5"/>
  </g>

  <!-- HERO: Continue Playing -->
  <rect x="30" y="80" width="1140" height="220" rx="16" fill="url(#hero)" filter="url(#softShadow)"/>

  <!-- Hero cover art placeholder -->
  <g clip-path="url(#heroClip)">
    <rect x="30" y="80" width="280" height="220" fill="#1e2a4a" opacity="0.8"/>
    <rect x="60" y="120" width="120" height="160" rx="8" fill="#2a3a5a"/>
    <text x="120" y="205" fill="#4a5a7a" font-size="11" text-anchor="middle">Cover Art</text>
  </g>

  <!-- Hero text -->
  <text x="340" y="126" fill="#8888aa" font-size="11" font-weight="600" letter-spacing="2">CONTINUE PLAYING</text>
  <text x="340" y="165" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="-0.5">Super Metroid</text>
  <text x="340" y="190" fill="#8888aa" font-size="14">Super Nintendo · Nintendo R&amp;D1 · 1994</text>
  <text x="340" y="212" fill="#666688" font-size="12">Last played 2 hours ago · 12h 34m total</text>

  <!-- Play button -->
  <rect x="340" y="235" width="130" height="42" rx="21" fill="url(#accent)" filter="url(#glow)"/>
  <text x="385" y="261" fill="#fff" font-size="14" font-weight="600">▶  Play Now</text>

  <!-- Progress bar -->
  <rect x="490" y="248" width="200" height="4" rx="2" fill="#1a1a2a"/>
  <rect x="490" y="248" width="130" height="4" rx="2" fill="url(#accent)" opacity="0.7"/>
  <text x="490" y="242" fill="#555" font-size="10">Save State 3 of 4</text>

  <!-- Section: Recently Added -->
  <text x="30" y="340" fill="#ffffff" font-size="16" font-weight="600">Recently Added</text>
  <text x="1135" y="340" fill="#6366f1" font-size="12" font-weight="500" text-anchor="end">See All →</text>

  <!-- Recently Added Cards -->
  <g>
    <!-- Card 1 -->
    <rect x="30" y="358" width="170" height="230" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="42" y="370" width="146" height="146" rx="8" fill="#1c1c2e"/>
    <text x="115" y="448" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="42" y="540" fill="#fff" font-size="12" font-weight="600">Chrono Trigger</text>
    <text x="42" y="556" fill="#6366f1" font-size="10">SNES</text>
    <text x="42" y="572" fill="#555" font-size="10">Square · 1995</text>

    <!-- Card 2 -->
    <rect x="215" y="358" width="170" height="230" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="227" y="370" width="146" height="146" rx="8" fill="#1c1c2e"/>
    <text x="300" y="448" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="227" y="540" fill="#fff" font-size="12" font-weight="600">Castlevania: SotN</text>
    <text x="227" y="556" fill="#6366f1" font-size="10">PS1</text>
    <text x="227" y="572" fill="#555" font-size="10">Konami · 1997</text>

    <!-- Card 3 -->
    <rect x="400" y="358" width="170" height="230" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="412" y="370" width="146" height="146" rx="8" fill="#1c1c2e"/>
    <text x="485" y="448" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="412" y="540" fill="#fff" font-size="12" font-weight="600">Pokémon Emerald</text>
    <text x="412" y="556" fill="#6366f1" font-size="10">GBA</text>
    <text x="412" y="572" fill="#555" font-size="10">Game Freak · 2004</text>

    <!-- Card 4 -->
    <rect x="585" y="358" width="170" height="230" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="597" y="370" width="146" height="146" rx="8" fill="#1c1c2e"/>
    <text x="670" y="448" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="597" y="540" fill="#fff" font-size="12" font-weight="600">Mega Man X</text>
    <text x="597" y="556" fill="#6366f1" font-size="10">SNES</text>
    <text x="597" y="572" fill="#555" font-size="10">Capcom · 1993</text>

    <!-- Card 5 -->
    <rect x="770" y="358" width="170" height="230" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="782" y="370" width="146" height="146" rx="8" fill="#1c1c2e"/>
    <text x="855" y="448" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="782" y="540" fill="#fff" font-size="12" font-weight="600">Sonic the Hedgehog 2</text>
    <text x="782" y="556" fill="#6366f1" font-size="10">Genesis</text>
    <text x="782" y="572" fill="#555" font-size="10">Sega · 1992</text>

    <!-- Card 6 (partially visible — implies scrollability) -->
    <rect x="955" y="358" width="170" height="230" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1" opacity="0.5"/>
    <rect x="967" y="370" width="146" height="146" rx="8" fill="#1c1c2e" opacity="0.5"/>
  </g>

  <!-- Section: Systems -->
  <text x="30" y="630" fill="#ffffff" font-size="16" font-weight="600">Your Systems</text>

  <!-- System pills -->
  <g>
    <rect x="30" y="648" width="140" height="110" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="100" y="695" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">SNES</text>
    <text x="100" y="715" fill="#6366f1" font-size="20" font-weight="700" text-anchor="middle">47</text>
    <text x="100" y="732" fill="#555" font-size="10" text-anchor="middle">games</text>

    <rect x="185" y="648" width="140" height="110" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="255" y="695" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">NES</text>
    <text x="255" y="715" fill="#6366f1" font-size="20" font-weight="700" text-anchor="middle">83</text>
    <text x="255" y="732" fill="#555" font-size="10" text-anchor="middle">games</text>

    <rect x="340" y="648" width="140" height="110" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="410" y="695" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">PlayStation</text>
    <text x="410" y="715" fill="#6366f1" font-size="20" font-weight="700" text-anchor="middle">31</text>
    <text x="410" y="732" fill="#555" font-size="10" text-anchor="middle">games</text>

    <rect x="495" y="648" width="140" height="110" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="565" y="695" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">GBA</text>
    <text x="565" y="715" fill="#6366f1" font-size="20" font-weight="700" text-anchor="middle">56</text>
    <text x="565" y="732" fill="#555" font-size="10" text-anchor="middle">games</text>

    <rect x="650" y="648" width="140" height="110" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="720" y="695" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Genesis</text>
    <text x="720" y="715" fill="#6366f1" font-size="20" font-weight="700" text-anchor="middle">29</text>
    <text x="720" y="732" fill="#555" font-size="10" text-anchor="middle">games</text>

    <rect x="805" y="648" width="140" height="110" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="875" y="695" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">N64</text>
    <text x="875" y="715" fill="#6366f1" font-size="20" font-weight="700" text-anchor="middle">22</text>
    <text x="875" y="732" fill="#555" font-size="10" text-anchor="middle">games</text>

    <rect x="960" y="648" width="140" height="110" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1" opacity="0.5"/>
    <text x="1030" y="695" fill="#fff" font-size="13" font-weight="600" text-anchor="middle" opacity="0.5">Game Boy</text>
    <text x="1030" y="715" fill="#6366f1" font-size="20" font-weight="700" text-anchor="middle" opacity="0.5">38</text>
    <text x="1030" y="732" fill="#555" font-size="10" text-anchor="middle" opacity="0.5">games</text>
  </g>

  <!-- Wireframe label -->
  <text x="1170" y="790" fill="#333" font-size="9" text-anchor="end">RETROLAUNCH — Home Screen Wireframe</text>
</svg>