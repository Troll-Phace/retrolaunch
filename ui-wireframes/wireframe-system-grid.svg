<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <linearGradient id="snesAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1028"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="hoverGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- System header area with theme color bleed -->
  <rect x="0" y="0" width="1200" height="140" fill="url(#headerGrad)"/>
  <rect x="0" y="135" width="1200" height="2" fill="#7c3aed" opacity="0.3"/>

  <!-- Back arrow -->
  <g transform="translate(30, 35)">
    <text fill="#7c3aed" font-size="18">←</text>
    <text x="22" y="0" fill="#888" font-size="12">Home</text>
  </g>

  <!-- System title -->
  <text x="30" y="80" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="-0.5">Super Nintendo</text>
  <text x="280" y="80" fill="#7c3aed" font-size="28" font-weight="300">47 games</text>

  <!-- Filter/sort bar -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="60" height="28" rx="14" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1"/>
    <text x="30" y="18" fill="#7c3aed" font-size="11" font-weight="600" text-anchor="middle">All</text>

    <rect x="70" y="0" width="80" height="28" rx="14" fill="transparent" stroke="#2a2a3a" stroke-width="1"/>
    <text x="110" y="18" fill="#666" font-size="11" text-anchor="middle">Action</text>

    <rect x="160" y="0" width="65" height="28" rx="14" fill="transparent" stroke="#2a2a3a" stroke-width="1"/>
    <text x="192" y="18" fill="#666" font-size="11" text-anchor="middle">RPG</text>

    <rect x="235" y="0" width="90" height="28" rx="14" fill="transparent" stroke="#2a2a3a" stroke-width="1"/>
    <text x="280" y="18" fill="#666" font-size="11" text-anchor="middle">Platform</text>

    <rect x="335" y="0" width="80" height="28" rx="14" fill="transparent" stroke="#2a2a3a" stroke-width="1"/>
    <text x="375" y="18" fill="#666" font-size="11" text-anchor="middle">Puzzle</text>
  </g>

  <!-- View toggle (grid/list) -->
  <g transform="translate(1090, 100)">
    <rect x="0" y="0" width="32" height="28" rx="6" fill="#7c3aed" opacity="0.2"/>
    <rect x="6" y="6" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="14" y="6" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="6" y="14" width="6" height="6" rx="1" fill="#7c3aed"/>
    <rect x="14" y="14" width="6" height="6" rx="1" fill="#7c3aed"/>

    <rect x="40" y="0" width="32" height="28" rx="6" fill="transparent" stroke="#2a2a3a" stroke-width="1"/>
    <rect x="48" y="8" width="16" height="2" rx="1" fill="#555"/>
    <rect x="48" y="13" width="16" height="2" rx="1" fill="#555"/>
    <rect x="48" y="18" width="16" height="2" rx="1" fill="#555"/>
  </g>

  <!-- Sort dropdown -->
  <g transform="translate(980, 100)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="transparent" stroke="#2a2a3a" stroke-width="1"/>
    <text x="15" y="18" fill="#666" font-size="11">Sort: A → Z  ▾</text>
  </g>

  <!-- Game Grid -->
  <!-- Row 1 -->
  <g>
    <!-- Card 1 — hovered state -->
    <rect x="30" y="155" width="175" height="245" rx="12" fill="#1a1428" stroke="#7c3aed" stroke-width="1.5" filter="url(#hoverGlow)"/>
    <rect x="42" y="167" width="151" height="151" rx="8" fill="#241a38"/>
    <text x="117" y="248" fill="#4a3a5e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="42" y="345" fill="#fff" font-size="12" font-weight="600">Super Metroid</text>
    <text x="42" y="361" fill="#a855f7" font-size="10">Action · 1994</text>
    <text x="42" y="377" fill="#555" font-size="10">Nintendo R&amp;D1</text>
    <!-- Hover play icon overlay -->
    <circle cx="117" cy="235" r="18" fill="#7c3aed" opacity="0.9"/>
    <text x="120" y="240" fill="#fff" font-size="14" text-anchor="middle">▶</text>

    <!-- Card 2 -->
    <rect x="220" y="155" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="232" y="167" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="307" y="248" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="232" y="345" fill="#fff" font-size="12" font-weight="600">Chrono Trigger</text>
    <text x="232" y="361" fill="#a855f7" font-size="10">RPG · 1995</text>
    <text x="232" y="377" fill="#555" font-size="10">Square</text>

    <!-- Card 3 -->
    <rect x="410" y="155" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="422" y="167" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="497" y="248" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="422" y="345" fill="#fff" font-size="12" font-weight="600">A Link to the Past</text>
    <text x="422" y="361" fill="#a855f7" font-size="10">Action RPG · 1991</text>
    <text x="422" y="377" fill="#555" font-size="10">Nintendo EAD</text>

    <!-- Card 4 -->
    <rect x="600" y="155" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="612" y="167" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="687" y="248" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="612" y="345" fill="#fff" font-size="12" font-weight="600">Mega Man X</text>
    <text x="612" y="361" fill="#a855f7" font-size="10">Action · 1993</text>
    <text x="612" y="377" fill="#555" font-size="10">Capcom</text>

    <!-- Card 5 -->
    <rect x="790" y="155" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="802" y="167" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="877" y="248" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="802" y="345" fill="#fff" font-size="12" font-weight="600">Super Mario World</text>
    <text x="802" y="361" fill="#a855f7" font-size="10">Platform · 1990</text>
    <text x="802" y="377" fill="#555" font-size="10">Nintendo EAD</text>

    <!-- Card 6 -->
    <rect x="980" y="155" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="992" y="167" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="1067" y="248" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="992" y="345" fill="#fff" font-size="12" font-weight="600">Final Fantasy VI</text>
    <text x="992" y="361" fill="#a855f7" font-size="10">RPG · 1994</text>
    <text x="992" y="377" fill="#555" font-size="10">Square</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="30" y="418" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="42" y="430" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="117" y="510" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="42" y="608" fill="#fff" font-size="12" font-weight="600">Donkey Kong Country</text>
    <text x="42" y="624" fill="#a855f7" font-size="10">Platform · 1994</text>
    <text x="42" y="640" fill="#555" font-size="10">Rare</text>

    <rect x="220" y="418" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="232" y="430" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="307" y="510" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="232" y="608" fill="#fff" font-size="12" font-weight="600">Street Fighter II Turbo</text>
    <text x="232" y="624" fill="#a855f7" font-size="10">Fighting · 1993</text>
    <text x="232" y="640" fill="#555" font-size="10">Capcom</text>

    <rect x="410" y="418" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="422" y="430" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="497" y="510" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="422" y="608" fill="#fff" font-size="12" font-weight="600">EarthBound</text>
    <text x="422" y="624" fill="#a855f7" font-size="10">RPG · 1994</text>
    <text x="422" y="640" fill="#555" font-size="10">Ape / HAL</text>

    <rect x="600" y="418" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="612" y="430" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="687" y="510" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="612" y="608" fill="#fff" font-size="12" font-weight="600">Super Castlevania IV</text>
    <text x="612" y="624" fill="#a855f7" font-size="10">Action · 1991</text>
    <text x="612" y="640" fill="#555" font-size="10">Konami</text>

    <rect x="790" y="418" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="802" y="430" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="877" y="510" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="802" y="608" fill="#fff" font-size="12" font-weight="600">Yoshi's Island</text>
    <text x="802" y="624" fill="#a855f7" font-size="10">Platform · 1995</text>
    <text x="802" y="640" fill="#555" font-size="10">Nintendo EAD</text>

    <rect x="980" y="418" width="175" height="245" rx="12" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="992" y="430" width="151" height="151" rx="8" fill="#1c1c2e"/>
    <text x="1067" y="510" fill="#3a3a4e" font-size="10" text-anchor="middle">Cover Art</text>
    <text x="992" y="608" fill="#fff" font-size="12" font-weight="600">Contra III</text>
    <text x="992" y="624" fill="#a855f7" font-size="10">Action · 1992</text>
    <text x="992" y="640" fill="#555" font-size="10">Konami</text>
  </g>

  <!-- Scroll indicator -->
  <rect x="1185" y="155" width="4" height="250" rx="2" fill="#1e1e30"/>
  <rect x="1185" y="155" width="4" height="80" rx="2" fill="#7c3aed" opacity="0.5"/>

  <!-- Bottom status bar -->
  <rect x="0" y="770" width="1200" height="30" fill="#0a0a12"/>
  <text x="30" y="789" fill="#444" font-size="10">47 games · 12.4 GB · Last scanned 5 min ago</text>
  <text x="1170" y="789" fill="#444" font-size="10" text-anchor="end">Emulator: bsnes v115</text>

  <!-- Wireframe label -->
  <text x="1170" y="765" fill="#333" font-size="9" text-anchor="end">RETROLAUNCH — System Grid View Wireframe</text>
</svg>