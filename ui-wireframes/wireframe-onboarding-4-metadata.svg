<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Step indicator -->
  <g transform="translate(525, 50)">
    <circle cx="0" cy="0" r="5" fill="#6366f1" opacity="0.4"/>
    <circle cx="25" cy="0" r="5" fill="#6366f1" opacity="0.4"/>
    <circle cx="50" cy="0" r="5" fill="#6366f1" opacity="0.4"/>
    <circle cx="75" cy="0" r="5" fill="#6366f1"/>
    <circle cx="100" cy="0" r="5" fill="#2a2a3a"/>
    <circle cx="125" cy="0" r="5" fill="#2a2a3a"/>
    <text x="62" y="25" fill="#555" font-size="10" text-anchor="middle">Step 4 of 6</text>
  </g>

  <text x="40" y="52" fill="#6366f1" font-size="14">← Back</text>

  <!-- Title -->
  <text x="600" y="120" fill="#ffffff" font-size="32" font-weight="700" text-anchor="middle" letter-spacing="-1">Fetch Game Metadata</text>
  <text x="600" y="150" fill="#8888aa" font-size="14" text-anchor="middle">Download cover art, descriptions, and details for your games. This may take a few minutes.</text>

  <!-- Overall progress -->
  <rect x="200" y="190" width="800" height="90" rx="14" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <text x="230" y="220" fill="#fff" font-size="16" font-weight="600">Fetching metadata...</text>
  <text x="230" y="242" fill="#888" font-size="12">198 of 330 games matched · 47 in progress · 85 remaining</text>
  <!-- Progress bar -->
  <rect x="230" y="256" width="740" height="8" rx="4" fill="#1a1a2e"/>
  <rect x="230" y="256" width="444" height="8" rx="4" fill="url(#accent)"/>
  <text x="940" y="242" fill="#6366f1" font-size="12" font-weight="600" text-anchor="end">60%</text>

  <!-- Live preview — games getting their art populated -->
  <text x="200" y="315" fill="#888" font-size="11" font-weight="600" letter-spacing="1.5">LIVE PREVIEW</text>

  <!-- Row of cards being populated with animation state cues -->
  <!-- Card 1 — fully matched -->
  <rect x="200" y="335" width="145" height="200" rx="10" fill="#141420" stroke="#4ade8040" stroke-width="1"/>
  <rect x="212" y="347" width="121" height="121" rx="6" fill="#1a2a1a"/>
  <text x="272" y="412" fill="#2a4a2a" font-size="9" text-anchor="middle">✓ Art loaded</text>
  <text x="212" y="492" fill="#fff" font-size="11" font-weight="600">Super Metroid</text>
  <text x="212" y="508" fill="#4ade80" font-size="9">● Matched</text>
  <text x="212" y="522" fill="#555" font-size="9">SNES · 1994</text>

  <!-- Card 2 — fully matched -->
  <rect x="358" y="335" width="145" height="200" rx="10" fill="#141420" stroke="#4ade8040" stroke-width="1"/>
  <rect x="370" y="347" width="121" height="121" rx="6" fill="#1a2a1a"/>
  <text x="430" y="412" fill="#2a4a2a" font-size="9" text-anchor="middle">✓ Art loaded</text>
  <text x="370" y="492" fill="#fff" font-size="11" font-weight="600">Chrono Trigger</text>
  <text x="370" y="508" fill="#4ade80" font-size="9">● Matched</text>
  <text x="370" y="522" fill="#555" font-size="9">SNES · 1995</text>

  <!-- Card 3 — currently fetching (pulsing state) -->
  <rect x="516" y="335" width="145" height="200" rx="10" fill="#141420" stroke="#f59e0b40" stroke-width="1"/>
  <rect x="528" y="347" width="121" height="121" rx="6" fill="#1a1a2e"/>
  <!-- Loading spinner representation -->
  <circle cx="588" cy="407" r="14" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="20 60" opacity="0.6"/>
  <text x="588" y="412" fill="#555" font-size="8" text-anchor="middle">Loading...</text>
  <text x="528" y="492" fill="#fff" font-size="11" font-weight="600">Mega Man X</text>
  <text x="528" y="508" fill="#f59e0b" font-size="9">⟳ Fetching...</text>
  <text x="528" y="522" fill="#555" font-size="9">SNES</text>

  <!-- Card 4 — queued -->
  <rect x="674" y="335" width="145" height="200" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1" opacity="0.6"/>
  <rect x="686" y="347" width="121" height="121" rx="6" fill="#1a1a2e" opacity="0.6"/>
  <text x="746" y="412" fill="#2a2a3a" font-size="9" text-anchor="middle">Queued</text>
  <text x="686" y="492" fill="#888" font-size="11" font-weight="500">Sonic 2</text>
  <text x="686" y="508" fill="#555" font-size="9">○ Pending</text>

  <!-- Card 5 — queued -->
  <rect x="832" y="335" width="145" height="200" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1" opacity="0.4"/>
  <rect x="844" y="347" width="121" height="121" rx="6" fill="#1a1a2e" opacity="0.4"/>
  <text x="904" y="412" fill="#2a2a3a" font-size="9" text-anchor="middle" opacity="0.6">Queued</text>
  <text x="844" y="492" fill="#888" font-size="11" font-weight="500" opacity="0.6">Pokémon Emerald</text>
  <text x="844" y="508" fill="#555" font-size="9" opacity="0.6">○ Pending</text>

  <!-- Stats summary -->
  <g transform="translate(200, 570)">
    <rect x="0" y="0" width="185" height="70" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="20" y="25" fill="#666" font-size="10">Matched</text>
    <text x="20" y="50" fill="#4ade80" font-size="22" font-weight="700">198</text>
    <text x="80" y="50" fill="#555" font-size="12">/ 330</text>

    <rect x="200" y="0" width="185" height="70" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="220" y="25" fill="#666" font-size="10">Cover Art</text>
    <text x="220" y="50" fill="#6366f1" font-size="22" font-weight="700">183</text>
    <text x="280" y="50" fill="#555" font-size="12">found</text>

    <rect x="400" y="0" width="185" height="70" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="420" y="25" fill="#666" font-size="10">No Match</text>
    <text x="420" y="50" fill="#f59e0b" font-size="22" font-weight="700">12</text>
    <text x="460" y="50" fill="#555" font-size="12">games</text>

    <rect x="600" y="0" width="200" height="70" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="620" y="25" fill="#666" font-size="10">Cache Size</text>
    <text x="620" y="50" fill="#888" font-size="22" font-weight="700">148 MB</text>
  </g>

  <!-- Option: skip / continue in background -->
  <text x="600" y="690" fill="#555" font-size="12" text-anchor="middle">You can continue to the app — metadata will keep downloading in the background.</text>

  <!-- Continue button -->
  <rect x="475" y="720" width="250" height="50" rx="25" fill="url(#accent)" filter="url(#glow)"/>
  <text x="600" y="751" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Continue →</text>

  <text x="1170" y="790" fill="#333" font-size="9" text-anchor="end">RETROLAUNCH — Onboarding 4/6: Metadata Fetch</text>
</svg>