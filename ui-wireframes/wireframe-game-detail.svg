<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <!-- Dynamic color gradient — extracted from cover art -->
    <linearGradient id="dynamicBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#0f1a2e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="playBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coverShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#9333ea" flood-opacity="0.3"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="screenClip"><rect x="0" y="0" width="1200" height="800" rx="0"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Dynamic color bleed from cover art — large blurred orb -->
  <g clip-path="url(#screenClip)">
    <circle cx="250" cy="300" r="350" fill="#9333ea" opacity="0.06" filter="url(#blur)"/>
    <circle cx="300" cy="250" r="200" fill="#7c3aed" opacity="0.08" filter="url(#blur)"/>
    <circle cx="800" cy="500" r="250" fill="#4f46e5" opacity="0.04" filter="url(#blur)"/>
  </g>

  <!-- Back nav -->
  <g transform="translate(30, 35)">
    <text fill="#9333ea" font-size="18">←</text>
    <text x="22" y="0" fill="#888" font-size="12">Super Nintendo</text>
  </g>

  <!-- Cover Art — large, with colored shadow -->
  <rect x="60" y="80" width="300" height="300" rx="16" fill="#1a1028" filter="url(#coverShadow)"/>
  <rect x="60" y="80" width="300" height="300" rx="16" fill="#241a38" stroke="#3a2a4e" stroke-width="1"/>
  <text x="210" y="235" fill="#4a3a5e" font-size="14" text-anchor="middle">Cover Art</text>
  <text x="210" y="255" fill="#3a2a4e" font-size="10" text-anchor="middle">300 × 300</text>

  <!-- Favorite heart icon on cover -->
  <circle cx="330" cy="110" r="16" fill="#0a0a0f" opacity="0.6"/>
  <text x="330" y="116" fill="#9333ea" font-size="14" text-anchor="middle">♥</text>

  <!-- Game Title + Metadata -->
  <text x="400" y="110" fill="#ffffff" font-size="36" font-weight="700" letter-spacing="-1">Super Metroid</text>

  <!-- System badge -->
  <rect x="400" y="122" width="55" height="22" rx="11" fill="#9333ea" opacity="0.15" stroke="#9333ea" stroke-width="0.5"/>
  <text x="427" y="137" fill="#c084fc" font-size="10" font-weight="600" text-anchor="middle">SNES</text>

  <rect x="465" y="122" width="62" height="22" rx="11" fill="#9333ea" opacity="0.15" stroke="#9333ea" stroke-width="0.5"/>
  <text x="496" y="137" fill="#c084fc" font-size="10" font-weight="600" text-anchor="middle">Action</text>

  <rect x="537" y="122" width="85" height="22" rx="11" fill="#9333ea" opacity="0.15" stroke="#9333ea" stroke-width="0.5"/>
  <text x="579" y="137" fill="#c084fc" font-size="10" font-weight="600" text-anchor="middle">Adventure</text>

  <!-- Info grid -->
  <text x="400" y="180" fill="#666" font-size="11" font-weight="600" letter-spacing="1.5">DEVELOPER</text>
  <text x="400" y="198" fill="#ddd" font-size="14">Nintendo R&amp;D1</text>

  <text x="600" y="180" fill="#666" font-size="11" font-weight="600" letter-spacing="1.5">PUBLISHER</text>
  <text x="600" y="198" fill="#ddd" font-size="14">Nintendo</text>

  <text x="800" y="180" fill="#666" font-size="11" font-weight="600" letter-spacing="1.5">RELEASED</text>
  <text x="800" y="198" fill="#ddd" font-size="14">March 19, 1994</text>

  <text x="1000" y="180" fill="#666" font-size="11" font-weight="600" letter-spacing="1.5">REGION</text>
  <text x="1000" y="198" fill="#ddd" font-size="14">Japan / USA</text>

  <!-- Divider -->
  <line x1="400" y1="218" x2="1150" y2="218" stroke="#1e1e30" stroke-width="1"/>

  <!-- Description -->
  <text x="400" y="248" fill="#666" font-size="11" font-weight="600" letter-spacing="1.5">ABOUT</text>
  <text x="400" y="270" fill="#aaa" font-size="13" letter-spacing="0.2">
    <tspan x="400" dy="0">Super Metroid is a side-scrolling action-adventure game in which the</tspan>
    <tspan x="400" dy="20">player controls bounty hunter Samus Aran on planet Zebes, searching</tspan>
    <tspan x="400" dy="20">for a stolen Metroid larva. Widely considered one of the greatest video</tspan>
    <tspan x="400" dy="20">games of all time, its atmospheric exploration and nonlinear design</tspan>
    <tspan x="400" dy="20">defined the "Metroidvania" genre.</tspan>
  </text>

  <!-- Play button — large and prominent -->
  <rect x="400" y="382" width="180" height="52" rx="26" fill="url(#playBtn)" filter="url(#glow)"/>
  <text x="468" y="414" fill="#fff" font-size="16" font-weight="700">▶   Launch</text>

  <!-- Secondary actions -->
  <rect x="600" y="382" width="140" height="52" rx="26" fill="transparent" stroke="#3a2a4e" stroke-width="1.5"/>
  <text x="641" y="413" fill="#c084fc" font-size="13" font-weight="500">★  Favorite</text>

  <rect x="758" y="382" width="52" height="52" rx="26" fill="transparent" stroke="#3a2a4e" stroke-width="1.5"/>
  <text x="784" y="414" fill="#888" font-size="18" text-anchor="middle">⋯</text>

  <!-- Stats row -->
  <g transform="translate(60, 410)">
    <text x="0" y="0" fill="#666" font-size="11" font-weight="600" letter-spacing="1.5">YOUR STATS</text>

    <rect x="0" y="14" width="135" height="65" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="15" y="40" fill="#666" font-size="10">Play Time</text>
    <text x="15" y="60" fill="#c084fc" font-size="18" font-weight="700">12h 34m</text>

    <rect x="150" y="14" width="135" height="65" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="165" y="40" fill="#666" font-size="10">Last Played</text>
    <text x="165" y="60" fill="#c084fc" font-size="18" font-weight="700">2h ago</text>
  </g>

  <!-- Screenshots section -->
  <text x="60" y="530" fill="#666" font-size="11" font-weight="600" letter-spacing="1.5">SCREENSHOTS</text>

  <rect x="60" y="545" width="260" height="146" rx="10" fill="#1a1028" stroke="#2a1a3e" stroke-width="1"/>
  <text x="190" y="622" fill="#3a2a4e" font-size="10" text-anchor="middle">Screenshot 1</text>

  <rect x="335" y="545" width="260" height="146" rx="10" fill="#1a1028" stroke="#2a1a3e" stroke-width="1"/>
  <text x="465" y="622" fill="#3a2a4e" font-size="10" text-anchor="middle">Screenshot 2</text>

  <rect x="610" y="545" width="260" height="146" rx="10" fill="#1a1028" stroke="#2a1a3e" stroke-width="1"/>
  <text x="740" y="622" fill="#3a2a4e" font-size="10" text-anchor="middle">Screenshot 3</text>

  <rect x="885" y="545" width="260" height="146" rx="10" fill="#1a1028" stroke="#2a1a3e" stroke-width="1" opacity="0.5"/>
  <text x="1015" y="622" fill="#3a2a4e" font-size="10" text-anchor="middle" opacity="0.5">Screenshot 4</text>

  <!-- ROM file info -->
  <text x="60" y="730" fill="#666" font-size="11" font-weight="600" letter-spacing="1.5">FILE INFO</text>
  <rect x="60" y="742" width="1090" height="40" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <text x="80" y="767" fill="#888" font-size="11">Super Metroid (Japan, USA) (En,Ja).sfc</text>
  <text x="520" y="767" fill="#555" font-size="11">3.0 MB</text>
  <text x="620" y="767" fill="#555" font-size="11">CRC32: A3E3F3C8</text>
  <text x="810" y="767" fill="#555" font-size="11">No-Intro verified ✓</text>
  <text x="1000" y="767" fill="#9333ea" font-size="11">Open in Finder</text>

  <!-- Dynamic color annotation -->
  <g transform="translate(920, 80)" opacity="0.7">
    <rect x="0" y="0" width="250" height="90" rx="8" fill="#141420" stroke="#2a1a3e" stroke-width="1" stroke-dasharray="4"/>
    <text x="15" y="22" fill="#9333ea" font-size="10" font-weight="600">↑ DYNAMIC COLOR PALETTE</text>
    <text x="15" y="40" fill="#666" font-size="10">Colors extracted from cover art</text>
    <text x="15" y="55" fill="#666" font-size="10">via vibrant.js — applied to accents,</text>
    <text x="15" y="70" fill="#666" font-size="10">glows, gradients, and badges</text>
    <circle cx="200" cy="30" r="10" fill="#9333ea"/>
    <circle cx="220" cy="30" r="10" fill="#c084fc"/>
    <circle cx="240" cy="30" r="10" fill="#4f46e5"/>
  </g>

  <!-- Wireframe label -->
  <text x="1170" y="795" fill="#333" font-size="9" text-anchor="end">RETROLAUNCH — Game Detail View Wireframe</text>
</svg>