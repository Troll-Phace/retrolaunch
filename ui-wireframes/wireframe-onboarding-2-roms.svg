<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Step indicator -->
  <g transform="translate(525, 50)">
    <circle cx="0" cy="0" r="5" fill="#6366f1" opacity="0.4"/>
    <circle cx="25" cy="0" r="5" fill="#6366f1"/>
    <circle cx="50" cy="0" r="5" fill="#2a2a3a"/>
    <circle cx="75" cy="0" r="5" fill="#2a2a3a"/>
    <circle cx="100" cy="0" r="5" fill="#2a2a3a"/>
    <circle cx="125" cy="0" r="5" fill="#2a2a3a"/>
    <text x="62" y="25" fill="#555" font-size="10" text-anchor="middle">Step 2 of 6</text>
  </g>

  <!-- Back button -->
  <text x="40" y="52" fill="#6366f1" font-size="14">← Back</text>

  <!-- Title -->
  <text x="600" y="120" fill="#ffffff" font-size="32" font-weight="700" text-anchor="middle" letter-spacing="-1">Where are your ROMs?</text>
  <text x="600" y="150" fill="#8888aa" font-size="14" text-anchor="middle">Add the folders where your game files are stored. You can always add more later.</text>

  <!-- Drop zone / primary add area -->
  <rect x="200" y="185" width="800" height="160" rx="16" fill="#141420" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="8 4"/>
  <g transform="translate(600, 240)">
    <circle cx="0" cy="0" r="28" fill="#6366f115" stroke="#6366f1" stroke-width="1"/>
    <text x="0" y="6" fill="#6366f1" font-size="24" text-anchor="middle">+</text>
  </g>
  <text x="600" y="300" fill="#ccc" font-size="14" font-weight="500" text-anchor="middle">Click to browse or drag a folder here</text>
  <text x="600" y="322" fill="#555" font-size="11" text-anchor="middle">RetroLaunch will recursively scan for ROM files</text>

  <!-- Added directories list -->
  <text x="200" y="385" fill="#888" font-size="11" font-weight="600" letter-spacing="1.5">ADDED DIRECTORIES</text>

  <!-- Directory 1 — scanned -->
  <rect x="200" y="400" width="800" height="64" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="220" y="414" width="36" height="36" rx="8" fill="#6366f115"/>
  <text x="238" y="438" fill="#6366f1" font-size="16" text-anchor="middle">📁</text>
  <text x="270" y="430" fill="#fff" font-size="13" font-weight="500">/Users/anthony/Games/ROMs</text>
  <text x="270" y="448" fill="#4ade80" font-size="11">✓ Found 247 files across 8 systems</text>
  <!-- Remove button -->
  <circle cx="970" cy="432" r="12" fill="#1e1e30"/>
  <text x="970" y="437" fill="#666" font-size="14" text-anchor="middle">×</text>

  <!-- Directory 2 — scanning -->
  <rect x="200" y="476" width="800" height="64" rx="10" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
  <rect x="220" y="490" width="36" height="36" rx="8" fill="#6366f115"/>
  <text x="238" y="514" fill="#6366f1" font-size="16" text-anchor="middle">📁</text>
  <text x="270" y="506" fill="#fff" font-size="13" font-weight="500">/Volumes/External/Retro Collection</text>
  <text x="270" y="524" fill="#f59e0b" font-size="11">⟳ Scanning... 83 files found</text>
  <!-- Scanning progress bar -->
  <rect x="470" y="519" width="120" height="3" rx="1.5" fill="#1e1e30"/>
  <rect x="470" y="519" width="72" height="3" rx="1.5" fill="#f59e0b"/>
  <circle cx="970" cy="508" r="12" fill="#1e1e30"/>
  <text x="970" y="513" fill="#666" font-size="14" text-anchor="middle">×</text>

  <!-- Detected systems preview -->
  <text x="200" y="585" fill="#888" font-size="11" font-weight="600" letter-spacing="1.5">DETECTED SYSTEMS</text>

  <g transform="translate(200, 600)">
    <rect x="0" y="0" width="95" height="60" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="47" y="28" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">SNES</text>
    <text x="47" y="46" fill="#6366f1" font-size="14" font-weight="700" text-anchor="middle">47</text>

    <rect x="105" y="0" width="95" height="60" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="152" y="28" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">NES</text>
    <text x="152" y="46" fill="#6366f1" font-size="14" font-weight="700" text-anchor="middle">83</text>

    <rect x="210" y="0" width="95" height="60" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="257" y="28" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">PS1</text>
    <text x="257" y="46" fill="#6366f1" font-size="14" font-weight="700" text-anchor="middle">31</text>

    <rect x="315" y="0" width="95" height="60" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="362" y="28" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">GBA</text>
    <text x="362" y="46" fill="#6366f1" font-size="14" font-weight="700" text-anchor="middle">56</text>

    <rect x="420" y="0" width="95" height="60" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="467" y="28" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Genesis</text>
    <text x="467" y="46" fill="#6366f1" font-size="14" font-weight="700" text-anchor="middle">29</text>

    <rect x="525" y="0" width="95" height="60" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="572" y="28" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">N64</text>
    <text x="572" y="46" fill="#6366f1" font-size="14" font-weight="700" text-anchor="middle">22</text>

    <rect x="630" y="0" width="95" height="60" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="677" y="28" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">GB/GBC</text>
    <text x="677" y="46" fill="#6366f1" font-size="14" font-weight="700" text-anchor="middle">38</text>

    <rect x="735" y="0" width="65" height="60" rx="8" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <text x="767" y="35" fill="#555" font-size="10" text-anchor="middle">+2 more</text>
  </g>

  <!-- Summary -->
  <text x="600" y="710" fill="#888" font-size="13" text-anchor="middle">330 games detected across 9 systems</text>

  <!-- Continue button -->
  <rect x="475" y="730" width="250" height="50" rx="25" fill="url(#accent)" filter="url(#glow)"/>
  <text x="600" y="761" fill="#fff" font-size="15" font-weight="600" text-anchor="middle">Continue →</text>

  <text x="1170" y="790" fill="#333" font-size="9" text-anchor="end">RETROLAUNCH — Onboarding 2/6: ROM Directories</text>
</svg>